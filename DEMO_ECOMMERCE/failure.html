<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStore | Payment Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-card {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 3rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .status-icon {
            font-size: 5rem;
            color: #ef4444;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="status-card">
            <div class="status-icon"><i class="bi bi-x-circle-fill"></i></div>
            <h2>Payment Failed</h2>
            <p>We were unable to process your payment. Please try again or use a different payment method.</p>
            <br>
            <a href="index.html" class="btn btn-primary">Try Again</a>
        </div>
    </div>
</body>

</html>
