<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStore | Order Received</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-card {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 3rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .status-icon {
            font-size: 5rem;
            color: #10b981;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .details {
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 0.5rem;
            text-align: left;
        }

        .details p {
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--gray);
        }

        .details span {
            float: right;
            color: var(--dark);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="status-card">
            <div class="status-icon"><i class="bi bi-check-circle-fill"></i></div>
            <h2>Order Successful!</h2>
            <p>Thank you for shopping with NexStore. Your payment has been processed securely via PaySim.</p>

            <div class="details">
                <p>Transaction ID: <span id="txnId">-</span></p>
                <p>Session ID: <span id="sessionId">-</span></p>
                <p>Status: <span style="color: #10b981;">SUCCESS</span></p>
            </div>

            <a href="index.html" class="btn btn-primary">Back to Store</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('txnId').innerText = urlParams.get('txn_id') || 'N/A';
        document.getElementById('sessionId').innerText = urlParams.get('session_id') || 'N/A';
    </script>
</body>

</html>
