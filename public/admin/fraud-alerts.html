<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Alerts — PaySim Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="brand"><i class="bi bi-shield-lock me-2"></i>PaySim Admin</div>
            <div class="nav-section">
                <p class="section-title">Main</p>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a>
                <a href="fraud-alerts.html" class="nav-link"><i class="bi bi-exclamation-triangle"></i> Fraud Alerts</a>
            </div>
            <div class="nav-section"
                style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="topbar">
                <h1 class="page-title">Fraud Alerts</h1>
                <div class="user-info"><span id="userName"></span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </div>
            <div class="content-area">
                <!-- Filter Bar -->
                <div class="data-card mb-4">
                    <div style="padding: 1rem 1.25rem;">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label small">Status</label>
                                <select class="form-select form-select-sm" id="filterStatus" onchange="loadAlerts()">
                                    <option value="">All</option>
                                    <option value="open" selected>Open</option>
                                    <option value="investigating">Investigating</option>
                                    <option value="resolved">Resolved</option>
                                    <option value="false_positive">False Positive</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Severity</label>
                                <select class="form-select form-select-sm" id="filterSeverity" onchange="loadAlerts()">
                                    <option value="">All</option>
                                    <option value="critical">Critical</option>
                                    <option value="high">High</option>
                                    <option value="medium">Medium</option>
                                    <option value="low">Low</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Type</label>
                                <select class="form-select form-select-sm" id="filterType" onchange="loadAlerts()">
                                    <option value="">All</option>
                                    <option value="amount_spike">Amount Spike</option>
                                    <option value="velocity_breach">Velocity Breach</option>
                                    <option value="card_testing">Card Testing</option>
                                    <option value="geo_mismatch">Geo Mismatch</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <span class="text-muted small" id="totalAlerts"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Alerts Table -->
                <div class="data-card">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Type</th>
                                    <th>Severity</th>
                                    <th>Description</th>
                                    <th>Txn Amount</th>
                                    <th>Customer</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="alertsBody">
                                <tr>
                                    <td colspan="9" class="text-center text-muted py-4">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-between align-items-center p-3 border-top">
                        <button class="btn btn-sm btn-outline-secondary" id="prevBtn" onclick="changePage(-1)"
                            disabled>← Previous</button>
                        <span id="pageInfo" class="text-muted small"></span>
                        <button class="btn btn-sm btn-outline-secondary" id="nextBtn" onclick="changePage(1)">Next
                            →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Resolve Modal -->
    <div class="modal fade" id="resolveModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Resolve Alert #<span id="resolveAlertId"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="alertDetail" class="mb-3"></div>
                    <div class="mb-3">
                        <label class="form-label">Resolution</label>
                        <select class="form-select" id="resolution">
                            <option value="resolved">Resolved — Confirmed fraud</option>
                            <option value="false_positive">False Positive — Not fraud</option>
                            <option value="investigating">Investigating — Needs review</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="resolveAlert()">
                        <i class="bi bi-check-circle me-1"></i> Submit
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) throw 'redirect';
        let currentPage = 1;
        const pageSize = 15;
        let currentAlertId = null;

        async function loadAlerts() {
            const status = document.getElementById('filterStatus').value;
            const severity = document.getElementById('filterSeverity').value;
            const type = document.getElementById('filterType').value;

            let url = `/dashboard/fraud-alerts?page=${currentPage}&limit=${pageSize}`;
            if (status) url += `&status=${status}`;
            if (severity) url += `&severity=${severity}`;
            if (type) url += `&type=${type}`;

            const { ok, data } = await api('GET', url);
            const tbody = document.getElementById('alertsBody');

            if (!ok || data.data.alerts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">No fraud alerts found</td></tr>';
                document.getElementById('totalAlerts').textContent = '0 alerts';
                return;
            }

            const { alerts, pagination } = data.data;
            document.getElementById('totalAlerts').textContent = `${pagination.total} alert(s)`;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${Math.ceil(pagination.total / pageSize)}`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= Math.ceil(pagination.total / pageSize);

            const typeIcons = {
                amount_spike: 'bi-graph-up-arrow',
                velocity_breach: 'bi-speedometer2',
                card_testing: 'bi-credit-card',
                geo_mismatch: 'bi-geo-alt'
            };

            tbody.innerHTML = alerts.map(a => `
            <tr>
                <td>#${a.id}</td>
                <td><i class="bi ${typeIcons[a.alert_type] || 'bi-exclamation-triangle'} me-1"></i> ${a.alert_type.replace(/_/g, ' ')}</td>
                <td>${statusBadge(a.severity)}</td>
                <td style="max-width: 250px;" class="truncate">${a.description}</td>
                <td class="fw-600">${a.amount ? formatCurrency(a.amount) : '—'}</td>
                <td>${a.first_name ? a.first_name + ' ' + a.last_name : '—'}</td>
                <td>${statusBadge(a.status)}</td>
                <td>${formatDate(a.created_at)}</td>
                <td>
                    ${a.status === 'open' || a.status === 'investigating' ? `
                        <button class="btn btn-sm btn-outline-primary" onclick="openResolve(${a.id})">
                            <i class="bi bi-check-circle"></i>
                        </button>
                    ` : (a.resolved_by_name || '—')}
                </td>
            </tr>
        `).join('');
        }

        function changePage(delta) {
            currentPage += delta;
            loadAlerts();
        }

        async function openResolve(id) {
            currentAlertId = id;
            document.getElementById('resolveAlertId').textContent = id;

            const { ok, data } = await api('GET', `/dashboard/fraud-alerts/${id}`);
            if (ok) {
                const a = data.data;
                document.getElementById('alertDetail').innerHTML = `
                <div class="border rounded p-3" style="font-size: 0.875rem;">
                    <p class="mb-1"><strong>Type:</strong> ${a.alert_type.replace(/_/g, ' ')}</p>
                    <p class="mb-1"><strong>Severity:</strong> ${statusBadge(a.severity)}</p>
                    <p class="mb-1"><strong>Description:</strong> ${a.description}</p>
                    ${a.txn_id ? `<p class="mb-1"><strong>Txn:</strong> ${a.txn_id} — ${formatCurrency(a.amount)}</p>` : ''}
                    ${a.first_name ? `<p class="mb-0"><strong>Customer:</strong> ${a.first_name} ${a.last_name} (${a.email})</p>` : ''}
                </div>
            `;
            }

            new bootstrap.Modal(document.getElementById('resolveModal')).show();
        }

        async function resolveAlert() {
            const resolution = document.getElementById('resolution').value;
            const { ok, data } = await api('PUT', `/dashboard/fraud-alerts/${currentAlertId}/resolve`, { resolution });

            bootstrap.Modal.getInstance(document.getElementById('resolveModal')).hide();

            if (ok) {
                showToast('Alert resolved', 'success');
                loadAlerts();
            } else {
                showToast(data.error?.message || 'Failed to resolve', 'danger');
            }
        }

        loadAlerts();
    </script>
</body>

</html>
