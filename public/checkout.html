<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — PaySim Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 1rem;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .checkout-container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                max-width: 500px;
            }
        }

        .summary-card {
            padding: 2rem;
        }

        .payment-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            padding: 2.5rem;
            border: 1px solid var(--border);
        }

        .merchant-badge {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .merchant-logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            font-weight: 800;
        }

        .amount-display {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .method-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: #f1f5f9;
            padding: 0.4rem;
            border-radius: 0.75rem;
        }

        .method-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            color: var(--text-muted);
            border: none;
            background: transparent;
        }

        .method-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-pay {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 2rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-pay:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .secure-tag {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: var(--radius);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }

        .success-icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 1rem;
        }

        .error-icon {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        /* OTP Styles */
        .otp-container {
            display: none;
            text-align: center;
        }

        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 45px;
            height: 55px;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }
    </style>
</head>

<body>
    <div class="checkout-container">
        <!-- Summary Section -->
        <div class="summary-card">
            <div class="merchant-badge">
                <div class="merchant-logo" id="mLogo">NS</div>
                <div>
                    <h5 class="mb-0" id="merchantName">NexStore</h5>
                    <small class="text-muted">Trusted Merchant</small>
                </div>
            </div>
            <div class="amount-display" id="displayAmount">₹0.00</div>
            <p class="text-muted" id="sessionDesc">Order for Premium Essentials</p>

            <hr class="my-4">

            <div id="orderDetails">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Subtotal</span>
                    <span id="subtotal">₹0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Processing Fee</span>
                    <span>₹0.00</span>
                </div>
                <div class="d-flex justify-content-between mt-3 fw-bold">
                    <span>Total Due</span>
                    <span id="totalDue">₹0.00</span>
                </div>
            </div>
        </div>

        <!-- Payment Section -->
        <div class="payment-card position-relative">
            <div class="result-overlay" id="resultOverlay">
                <!-- Inner content injected by JS -->
            </div>

            <h4 class="mb-4 fw-800">Payment Details</h4>

            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" id="guestEmail" class="form-control" placeholder="receipts@example.com" required>
            </div>

            <div id="paymentMethods">
                <div class="method-tabs" id="methodTabs">
                    <button class="method-tab active" data-method="card"><i
                            class="bi bi-credit-card me-2"></i>Card</button>
                    <button class="method-tab" data-method="upi"><i class="bi bi-phone me-2"></i>UPI</button>
                    <button class="method-tab" data-method="netbanking"><i class="bi bi-bank me-2"></i>Bank</button>
                </div>

                <form id="paymentForm">
                    <!-- Card Section -->
                    <div id="cardFields">
                        <div class="mb-3">
                            <label class="form-label">Cardholder Name</label>
                            <input type="text" id="cardName" class="form-control" placeholder="JANE DOE">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                                <input type="text" id="cardNumber" class="form-control"
                                    placeholder="4242 4242 4242 4242">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-7">
                                <label class="form-label">Expiry Date</label>
                                <input type="text" id="expiry" class="form-control" placeholder="MM / YY">
                            </div>
                            <div class="col-5">
                                <label class="form-label">CVV</label>
                                <input type="password" id="cvv" class="form-control" placeholder="***">
                            </div>
                        </div>
                    </div>

                    <!-- UPI Section -->
                    <div id="upiFields" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">UPI ID</label>
                            <input type="text" id="upiId" class="form-control" placeholder="username@bank">
                        </div>
                    </div>

                    <!-- Bank Section -->
                    <div id="bankFields" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Select Bank</label>
                            <select id="bankSelect" class="form-select">
                                <option value="">Choose a bank...</option>
                                <option value="HDFC">HDFC Bank</option>
                                <option value="ICICI">ICICI Bank</option>
                                <option value="SBI">State Bank of India</option>
                                <option value="AXIS">Axis Bank</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-pay" id="payBtn">
                        <span>Pay Securely</span>
                        <i class="bi bi-lock-fill"></i>
                    </button>
                </form>
            </div>

            <!-- OTP Verification Step -->
            <div id="otpSection" class="otp-container">
                <div class="icon-circle mb-4"
                    style="width: 70px; height: 70px; border-radius: 50%; background: #eef2ff; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                    <i class="bi bi-shield-lock-fill" style="font-size: 2rem; color: #6366f1;"></i>
                </div>
                <h3 class="fw-800">Verify Payment</h3>
                <p class="text-muted">A 6-digit code has been sent to your email to authorize this transaction.</p>

                <div class="otp-inputs" id="otpInputs">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                </div>

                <button class="btn-pay" id="verifyOtpBtn">
                    <span>Verify & Pay</span>
                    <i class="bi bi-arrow-right"></i>
                </button>
                <button class="btn btn-link text-muted mt-3 text-decoration-none"
                    onclick="location.reload()">Cancel</button>
            </div>

            <div class="secure-tag">
                <i class="bi bi-shield-check"></i>
                <span>PCI-DSS Compliant • 256-bit Encryption</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sessionData = null;
        let activeMethod = 'card';

        // URL Params
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionId) {
                alert('No session ID provided');
                return;
            }
            loadSession();
            setupTabs();
            setupForm();
        });

        async function loadSession() {
            try {
                const res = await fetch(`/api/v1/platform/payment/${sessionId}`);
                const result = await res.json();

                if (!res.ok) {
                    alert('Session expired or invalid');
                    return;
                }

                sessionData = result.data;
                const formatted = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(sessionData.amount);

                document.getElementById('displayAmount').innerText = formatted;
                document.getElementById('subtotal').innerText = formatted;
                document.getElementById('totalDue').innerText = formatted;
                document.getElementById('merchantName').innerText = sessionData.merchant || 'NexStore';
                document.getElementById('mLogo').innerText = (sessionData.merchant || 'NS').substring(0, 2).toUpperCase();
                document.getElementById('sessionDesc').innerText = sessionData.description || 'Order Summary';

            } catch (err) {
                console.error(err);
            }
        }

        function setupTabs() {
            const tabs = document.querySelectorAll('.method-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    activeMethod = tab.dataset.method;

                    document.getElementById('cardFields').style.display = activeMethod === 'card' ? 'block' : 'none';
                    document.getElementById('upiFields').style.display = activeMethod === 'upi' ? 'block' : 'none';
                    document.getElementById('bankFields').style.display = activeMethod === 'bank' ? 'block' : 'none';
                });
            });
        }

        function setupForm() {
            // Input Masking
            const cardInput = document.getElementById('cardNumber');
            cardInput.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                value = value.match(/.{1,4}/g)?.join(' ') || '';
                e.target.value = value.substring(0, 19);
            });

            const expiryInput = document.getElementById('expiry');
            expiryInput.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 2) value = value.substring(0, 2) + ' / ' + value.substring(2, 4);
                e.target.value = value.substring(0, 7);
            });

            document.getElementById('paymentForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const btn = document.getElementById('payBtn');
                const overlay = document.getElementById('resultOverlay');
                const email = document.getElementById('guestEmail').value;

                if (!email) {
                    alert('Please enter your email for the receipt');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';

                // Collect payment data
                const paymentData = {
                    session_id: sessionId,
                    email: email,
                    method_type: activeMethod,
                    details: {}
                };

                if (activeMethod === 'card') {
                    const expiryVal = document.getElementById('expiry').value;
                    const [month, year] = expiryVal.split(' / ');

                    paymentData.details = {
                        cardholder_name: document.getElementById('cardName').value,
                        card_number: document.getElementById('cardNumber').value.replace(/\s/g, ''),
                        brand: document.getElementById('cardNumber').value.startsWith('4') ? 'visa' : 'mastercard',
                        last4: document.getElementById('cardNumber').value.replace(/\s/g, '').slice(-4),
                        expiry_month: month,
                        expiry_year: '20' + year
                    };
                } else if (activeMethod === 'upi') {
                    paymentData.details = {
                        upi_id: document.getElementById('upiId').value,
                        account_holder_name: 'Guest'
                    };
                } else {
                    paymentData.details = {
                        bank: document.getElementById('bankSelect').value,
                        account_holder_name: 'Guest'
                    };
                }

                try {
                    const res = await fetch('/api/v1/platform/process-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(paymentData)
                    });

                    const result = await res.json();

                    if (result.success && result.data.status === 'requires_otp') {
                        // Switch to OTP UI
                        document.getElementById('paymentMethods').style.display = 'none';
                        document.getElementById('otpSection').style.display = 'block';
                        initOtpInputs();

                        // Handle OTP Verification
                        document.getElementById('verifyOtpBtn').onclick = async () => {
                            const otpCode = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
                            if (otpCode.length < 6) return alert('Please enter full OTP');

                            const verifyBtn = document.getElementById('verifyOtpBtn');
                            verifyBtn.disabled = true;
                            verifyBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';

                            try {
                                const verifyRes = await fetch('/api/v1/platform/process-payment', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ ...paymentData, otp_code: otpCode })
                                });
                                const finalResult = await verifyRes.json();
                                handleFinalResult(finalResult);
                            } catch (err) {
                                console.error(err);
                                alert('Verification failed');
                                verifyBtn.disabled = false;
                                verifyBtn.innerHTML = 'Verify & Pay <i class="bi bi-arrow-right ms-2"></i>';
                            }
                        };
                    } else {
                        handleFinalResult(result);
                    }

                } catch (err) {
                    console.error(err);
                    alert('Technical error occurred');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Pay Securely</span> <i class="bi bi-lock-fill"></i>';
                }
            });

            function initOtpInputs() {
                const inputs = document.querySelectorAll('.otp-input');
                inputs.forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        if (e.target.value.length === 1 && index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    });
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Backspace' && !e.target.value && index > 0) {
                            inputs[index - 1].focus();
                        }
                    });
                });
            }

            function handleFinalResult(result) {
                const overlay = document.getElementById('resultOverlay');
                overlay.style.display = 'flex';
                if (result.success) {
                    overlay.innerHTML = `
                        <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
                        <h3>Payment Successful</h3>
                        <p class="text-muted">Redirecting you back to ${sessionData.merchant}...</p>
                    `;
                    if (result.data.redirect_url) {
                        setTimeout(() => window.location.href = result.data.redirect_url, 2000);
                    }
                } else {
                    overlay.innerHTML = `
                        <div class="error-icon"><i class="bi bi-x-circle-fill"></i></div>
                        <h3>Payment Failed</h3>
                        <p class="text-muted">${result.error?.message || 'Transaction could not be completed'}</p>
                        <button class="btn btn-outline-primary mt-3" onclick="location.reload()">Try Again</button>
                    `;
                }
            }
        }
    </script>
</body>

</html>
