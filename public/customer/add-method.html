<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Payment Method — PaySim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="brand"><i class="bi bi-shield-lock-fill"></i> PaySim</div>
            <div class="nav-section">
                <p class="section-title">Home</p>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door"></i> Home</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Payments</p>
                <a href="pay.html" class="nav-link"><i class="bi bi-send"></i> Make Payment</a>
                <a href="history.html" class="nav-link"><i class="bi bi-clock-history"></i> Transactions</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Banking</p>
                <a href="methods.html" class="nav-link"><i class="bi bi-credit-card"></i> My Methods</a>
                <a href="add-method.html" class="nav-link active"><i class="bi bi-plus-circle"></i> Add Method</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Settings</p>
                <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i> My Profile</a>
            </div>
            <div class="nav-section" style="margin-top: auto;">
                <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="topbar">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle"><i
                            class="bi bi-list"></i></button>
                    <h1 class="page-title">Add Payment Method</h1>
                </div>
                <div class="user-info">
                    <div class="theme-toggle me-2" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                        <i class="bi bi-moon-fill"></i>
                    </div>
                    <span id="userName" class="d-none d-sm-inline"></span>
                    <div class="user-avatar" id="userAvatar">C</div>
                </div>
            </div>

            <div class="content-area">
                <!-- Method Type Selector -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3 col-6">
                        <div class="method-card text-center selected" onclick="selectType('wallet', this)">
                            <div class="method-icon icon-primary mx-auto"><i class="bi bi-wallet2"></i></div>
                            <div class="fw-600">Wallet</div>
                            <small class="text-muted">Digital wallet</small>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="method-card text-center" onclick="selectType('credit_card', this)">
                            <div class="method-icon icon-info mx-auto"><i class="bi bi-credit-card"></i></div>
                            <div class="fw-600">Credit Card</div>
                            <small class="text-muted">Visa, MasterCard, etc.</small>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="method-card text-center" onclick="selectType('bank_account', this)">
                            <div class="method-icon icon-success mx-auto"><i class="bi bi-bank"></i></div>
                            <div class="fw-600">Bank Account</div>
                            <small class="text-muted">Savings or Current</small>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="method-card text-center" onclick="selectType('net_banking', this)">
                            <div class="method-icon icon-warning mx-auto"><i class="bi bi-globe"></i></div>
                            <div class="fw-600">Net Banking</div>
                            <small class="text-muted">Link a bank account</small>
                        </div>
                    </div>
                </div>

                <!-- Forms -->
                <div class="data-card" style="max-width: 600px;">
                    <div class="card-header">
                        <h5 id="formTitle">Add Wallet</h5>
                    </div>
                    <div style="padding: 1.5rem;">

                        <!-- Wallet Form -->
                        <form id="walletForm" onsubmit="addWallet(event)">
                            <div class="mb-3">
                                <label class="form-label">Initial Balance (₹)</label>
                                <input type="number" class="form-control" id="walletBalance" value="5000" min="0"
                                    step="0.01">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Currency</label>
                                <select class="form-select" id="walletCurrency">
                                    <option>INR</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> Create
                                Wallet</button>
                        </form>

                        <!-- Credit Card Form -->
                        <form id="cardForm" style="display:none;" onsubmit="addCard(event)">
                            <div class="mb-3">
                                <label class="form-label">Card Number</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="cardNumber"
                                        placeholder="4111 1111 1111 1111" maxlength="19">
                                    <button class="btn btn-outline-secondary" type="button" tabindex="-1"
                                        onclick="toggleVisibility('cardNumber', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Cardholder Name</label>
                                <input type="text" class="form-control" id="cardName" placeholder="JOHN DOE">
                            </div>
                            <div class="row mb-3">
                                <div class="col-4">
                                    <label class="form-label">Expiry Month</label>
                                    <input type="text" class="form-control" id="cardExpMonth" placeholder="12"
                                        maxlength="2" required>
                                </div>
                                <div class="col-4">
                                    <label class="form-label">Expiry Year</label>
                                    <input type="text" class="form-control" id="cardExpYear" placeholder="2028"
                                        maxlength="4" required>
                                </div>
                                <div class="col-4">
                                    <label class="form-label">CVV</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="cardCvv" placeholder="***"
                                            maxlength="4" required>
                                        <button class="btn btn-outline-secondary" type="button" tabindex="-1"
                                            onclick="toggleVisibility('cardCvv', this)">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Brand</label>
                                <select class="form-select" id="cardBrand">
                                    <option value="visa">Visa</option>
                                    <option value="mastercard">MasterCard</option>
                                    <option value="rupay">RuPay</option>
                                    <option value="amex">Amex</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Credit Limit (₹)</label>
                                <input type="number" class="form-control" id="cardLimit" value="100000" min="0">
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> Add
                                Card</button>
                        </form>

                        <!-- Bank Account Form -->
                        <form id="bankForm" style="display:none;" onsubmit="addBank(event)">
                            <div class="mb-3">
                                <label class="form-label">Account Number</label>
                                <input type="text" class="form-control" id="bankAccNo" placeholder="1234567890">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Account Holder Name</label>
                                <input type="text" class="form-control" id="bankHolder" placeholder="John Doe">
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label">Bank Name</label>
                                    <input type="text" class="form-control" id="bankName"
                                        placeholder="State Bank of India">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">IFSC Code</label>
                                    <input type="text" class="form-control" id="bankIFSC" placeholder="SBIN0001234">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label">Account Type</label>
                                    <select class="form-select" id="bankType">
                                        <option value="savings">Savings</option>
                                        <option value="current">Current</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Balance (₹)</label>
                                    <input type="number" class="form-control" id="bankBalance" value="50000" min="0">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> Add
                                Bank Account</button>
                        </form>

                        <!-- Net Banking Form -->
                        <form id="netBankingForm" style="display:none;" onsubmit="addNetBanking(event)">
                            <div class="mb-3">
                                <label class="form-label">Select Bank Account to Link</label>
                                <select class="form-select" id="netBankSelect">
                                    <option value="">Loading bank accounts...</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-link-45deg me-1"></i> Link Net
                                Banking</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) throw 'redirect';
        let selectedType = 'wallet';

        function selectType(type, el) {
            selectedType = type;
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');

            const titles = { wallet: 'Add Wallet', credit_card: 'Add Credit Card', bank_account: 'Add Bank Account', net_banking: 'Link Net Banking' };
            document.getElementById('formTitle').textContent = titles[type];

            ['walletForm', 'cardForm', 'bankForm', 'netBankingForm'].forEach(id => document.getElementById(id).style.display = 'none');
            const formMap = { wallet: 'walletForm', credit_card: 'cardForm', bank_account: 'bankForm', net_banking: 'netBankingForm' };
            document.getElementById(formMap[type]).style.display = '';

            if (type === 'net_banking') loadBankAccounts();
        }

        async function loadBankAccounts() {
            const { ok, data } = await api('GET', '/instruments/bank-accounts');
            const select = document.getElementById('netBankSelect');
            if (ok && data.data.length > 0) {
                select.innerHTML = data.data.map(b =>
                    `<option value="${b.id}">${b.bank_name} - ****${b.account_last_four} (₹${b.balance})</option>`
                ).join('');
            } else {
                select.innerHTML = '<option value="">No bank accounts found — add one first</option>';
            }
        }

        async function addWallet(e) {
            e.preventDefault();
            const { ok, data } = await api('POST', '/instruments/wallets', {
                initial_balance: parseFloat(document.getElementById('walletBalance').value),
                currency: document.getElementById('walletCurrency').value
            });
            ok ? showToast('Wallet created!', 'success') : showToast(data.error?.message || 'Failed', 'danger');
        }

        // Add real-time card number formatting
        document.getElementById('cardNumber')?.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, ''); // Remove non-digits
            value = value.match(/.{1,4}/g)?.join(' ') || value; // Add space every 4 digits
            e.target.value = value;
        });

        function toggleVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        async function addCard(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
            btn.disabled = true;

            const cardNumberStr = document.getElementById('cardNumber').value.replace(/\s+/g, ''); // Strip spaces
            if (cardNumberStr.length < 13 || cardNumberStr.length > 19) {
                alert('Please enter a valid card number length.');
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            const payload = {
                card_number: cardNumberStr,
                cardholder_name: document.getElementById('cardName').value,
                expiry_month: document.getElementById('cardExpMonth').value,
                expiry_year: document.getElementById('cardExpYear').value,
                card_brand: document.getElementById('cardBrand').value,
                credit_limit: 100000 // default simulated limit
            };

            const { ok, data } = await api('POST', '/instruments/cards', payload);
            if (ok) {
                alert('Credit Card added successfully!');
                window.location.href = 'methods.html';
            } else {
                alert(data?.error?.message || 'Failed to add card');
            }
            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        async function addBank(e) {
            e.preventDefault();
            const { ok, data } = await api('POST', '/instruments/bank-accounts', {
                account_number: document.getElementById('bankAccNo').value,
                account_holder_name: document.getElementById('bankHolder').value,
                bank_name: document.getElementById('bankName').value,
                ifsc_code: document.getElementById('bankIFSC').value,
                account_type: document.getElementById('bankType').value,
                balance: parseFloat(document.getElementById('bankBalance').value)
            });
            ok ? showToast('Bank account added!', 'success') : showToast(data.error?.message || 'Failed', 'danger');
        }

        async function addNetBanking(e) {
            e.preventDefault();
            const bankId = document.getElementById('netBankSelect').value;
            if (!bankId) return showToast('Select a bank account first', 'warning');
            const { ok, data } = await api('POST', '/instruments/net-banking', { bank_account_id: parseInt(bankId) });
            ok ? showToast('Net Banking linked!', 'success') : showToast(data.error?.message || 'Failed', 'danger');
        }
    </script>
</body>

</html>
