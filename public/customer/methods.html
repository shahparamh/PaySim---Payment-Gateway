<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payment Methods — PaySim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="brand"><i class="bi bi-shield-lock-fill"></i> PaySim</div>
            <div class="nav-section">
                <p class="section-title">Home</p>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door"></i> Home</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Payments</p>
                <a href="pay.html" class="nav-link"><i class="bi bi-send"></i> Make Payment</a>
                <a href="history.html" class="nav-link"><i class="bi bi-clock-history"></i> Transactions</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Banking</p>
                <a href="methods.html" class="nav-link active"><i class="bi bi-credit-card"></i> My Methods</a>
                <a href="add-method.html" class="nav-link"><i class="bi bi-plus-circle"></i> Add Method</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Settings</p>
                <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i> My Profile</a>
            </div>
            <div class="nav-section" style="margin-top: auto;">
                <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="topbar">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle"><i
                            class="bi bi-list"></i></button>
                    <h1 class="page-title">My Payment Methods</h1>
                </div>
                <div class="user-info">
                    <div class="theme-toggle me-2" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                        <i class="bi bi-moon-fill"></i>
                    </div>
                    <span id="userName"></span>
                    <div class="user-avatar shadow-glow" id="userAvatar">C</div>
                </div>
            </div>
            <div class="content-area">
                <!-- Wallets -->
                <h6 class="text-uppercase text-muted mb-3"><i class="bi bi-wallet2 me-1"></i> Wallets</h6>
                <div class="row g-3 mb-4" id="walletList">
                    <div class="col-md-4">
                        <div class="stat-card glass-panel skeleton" style="height: 140px;"></div>
                    </div>
                </div>

                <!-- Credit Cards -->
                <h6 class="text-uppercase text-muted mb-3"><i class="bi bi-credit-card me-1"></i> Credit Cards</h6>
                <div class="row g-3 mb-4" id="cardList">
                    <div class="col-md-4">
                        <div class="stat-card glass-panel skeleton" style="height: 200px;"></div>
                    </div>
                </div>

                <!-- Bank Accounts -->
                <h6 class="text-uppercase text-muted mb-3"><i class="bi bi-bank me-1"></i> Bank Accounts</h6>
                <div class="row g-3 mb-4" id="bankList">
                    <div class="col-md-4">
                        <div class="stat-card glass-panel skeleton" style="height: 160px;"></div>
                    </div>
                </div>

                <a href="add-method.html" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> Add New
                    Method</a>
            </div>
        </div>
    </div>

    <!-- Pay Bill Modal -->
    <div class="modal fade" id="billModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-700">Pay Credit Card Bill</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="billForm" onsubmit="processBillPayment(event)">
                        <input type="hidden" id="billCardId">
                        <div class="mb-3">
                            <label class="form-label">Amount to Pay (₹)</label>
                            <input type="number" class="form-control form-control-lg" id="billAmount" min="1"
                                step="0.01" required>
                            <div class="form-text mt-1">Due Amount: <span id="billDueAmount"
                                    class="fw-600 text-dark"></span></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Payment Source</label>
                            <select class="form-select form-select-lg" id="billSourceSelect" required>
                                <option value="" disabled selected>Select wallet or bank account...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2" id="billBtn">
                            Pay Now
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) throw 'redirect';
        let billModal = null;

        async function loadAll() {
            const [wallets, cards, banks] = await Promise.all([
                api('GET', '/instruments/wallets'),
                api('GET', '/instruments/cards'),
                api('GET', '/instruments/bank-accounts')
            ]);

            // Render Wallets
            document.getElementById('walletList').innerHTML = (wallets.ok && wallets.data.data.length > 0)
                ? wallets.data.data.map(w => `
                <div class="col-md-4">
                    <div class="payment-card text-white animate-fade-in" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none;">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-icon icon-primary" style="background: rgba(255, 255, 255, 0.2); color: #ffffff;"><i class="bi bi-wallet2"></i></div>
                            <span class="badge bg-primary opacity-75">Active</span>
                        </div>
                        <div class="stat-value mt-2" style="font-size: 1.5rem;">${formatCurrency(w.balance)}</div>
                        <div class="small fw-600 text-uppercase opacity-75">${w.currency} Wallet</div>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <small class="opacity-75">ID: ${w.wallet_id?.substring(0, 8)}...</small>
                            <a href="pay.html" class="btn btn-sm btn-link text-white p-0"><i class="bi bi-plus-circle me-1"></i> Top Up</a>
                        </div>
                    </div>
                </div>
            `).join('')
                : '<div class="col-12"><p class="text-muted">No wallets. <a href="add-method.html">Add one →</a></p></div>';

            // Render Cards
            document.getElementById('cardList').innerHTML = (cards.ok && cards.data.data.length > 0)
                ? cards.data.data.map(c => `
                <div class="col-md-4">
                    <div class="payment-card text-white animate-fade-in" style="background: linear-gradient(135deg, ${c.card_brand === 'visa' ? '#1e40af, #3b82f6' : c.card_brand === 'mastercard' ? '#475569, #0f172a' : '#312e81, #1e1b4b'});">
                        <div class="card-brand-badge">${c.card_brand}</div>
                        <div class="card-chip"></div>
                        
                        <div class="card-number-display d-flex justify-content-between align-items-center">
                            <span id="cardNumber-${c.id}">•••• •••• •••• ${c.card_last_four}</span>
                            <button class="btn btn-link btn-sm p-0 text-white-50" onclick="toggleCardVisibility(${c.id}, '${c.card_last_four}')" id="toggleBtn-${c.id}">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <div class="card-info-grid">
                            <div class="info-item">
                                <span class="label">Limit</span>
                                <span class="value">${formatCurrency(c.credit_limit)}</span>
                            </div>
                            <div class="info-item">
                                <span class="label">Used</span>
                                <span class="value">${formatCurrency(c.used_credit)}</span>
                            </div>
                            <div class="info-item text-end">
                                <span class="label">Expires</span>
                                <span class="value">${c.expiry_month}/${c.expiry_year}</span>
                            </div>
                        </div>

                        <div class="card-actions-row">
                            ${c.used_credit > 0 ? `
                            <button class="btn btn-sm btn-primary flex-grow-1" onclick="showBillModal(${c.id}, ${c.used_credit})">
                                <i class="bi bi-receipt me-1"></i> Pay Bill
                            </button>` : ''}
                            <button class="btn btn-sm btn-outline-light opacity-50" onclick="confirmDeleteCard(${c.id})" title="Remove Card">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('')
                : '<div class="col-12"><p class="text-muted">No credit cards. <a href="add-method.html">Add one →</a></p></div>';

            // Render Banks
            document.getElementById('bankList').innerHTML = (banks.ok && banks.data.data.length > 0)
                ? banks.data.data.map(b => `
                <div class="col-md-4">
                    <div class="payment-card text-white animate-fade-in" style="background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 180px;">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-icon icon-success" style="background: rgba(16, 185, 129, 0.2); color: #10b981;"><i class="bi bi-bank"></i></div>
                            ${statusBadge(b.status)}
                        </div>
                        <div class="fw-700 mt-2 fs-5">${b.bank_name}</div>
                        <div class="small opacity-75">•••• ${b.account_last_four} · ${b.account_type.toUpperCase()}</div>
                        <div class="stat-value mt-2" style="font-size: 1.5rem;">${formatCurrency(b.balance)}</div>
                        <div class="mt-auto d-flex justify-content-between">
                            <small class="opacity-75">IFSC: ${b.ifsc_code}</small>
                        </div>
                    </div>
                </div>
            `).join('')
                : '<div class="col-12"><p class="text-muted">No bank accounts. <a href="add-method.html">Add one →</a></p></div>';

            // Populate Source Select for Modal
            populateSourceSelect(wallets.data.data, banks.data.data);
        }

        function populateSourceSelect(wallets, banks) {
            const select = document.getElementById('billSourceSelect');
            const pmReq = api('GET', '/instruments/payment-methods');

            pmReq.then(({ ok, data }) => {
                if (!ok) return;
                const pms = data.data;
                const options = pms.filter(p => p.method_type === 'wallet' || p.method_type === 'bank_account' || p.method_type === 'net_banking')
                    .map(pm => {
                        let label = pm.method_type.replace(/_/g, ' ').toUpperCase();
                        let icon = pm.method_type === 'wallet' ? '👛' : '🏦';
                        return `<option value="${pm.id}">${icon} ${label} (ID: ${pm.instrument_id})</option>`;
                    }).join('');

                select.innerHTML = '<option value="" disabled selected>Select wallet or bank account...</option>' + options;
            });
        }

        function showBillModal(cardId, usedCredit) {
            if (!billModal) billModal = new bootstrap.Modal(document.getElementById('billModal'));
            document.getElementById('billCardId').value = cardId;
            document.getElementById('billDueAmount').textContent = formatCurrency(usedCredit);
            document.getElementById('billAmount').value = usedCredit > 0 ? usedCredit : '';
            billModal.show();
        }

        async function processBillPayment(e) {
            e.preventDefault();
            const btn = document.getElementById('billBtn');
            const cardId = document.getElementById('billCardId').value;
            const amount = document.getElementById('billAmount').value;
            const sourceId = document.getElementById('billSourceSelect').value;

            if (!sourceId) return showToast('Select a payment source', 'warning');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';

            const { ok, data } = await api('POST', `/instruments/cards/${cardId}/pay-bill`, {
                source_method_id: parseInt(sourceId),
                amount: parseFloat(amount)
            });

            btn.disabled = false;
            btn.innerHTML = 'Pay Now';

            if (ok) {
                showToast('Bill paid successfully!', 'success');
                billModal.hide();
                loadAll(); // Refresh data
            } else {
                showToast(data.error?.message || 'Payment failed', 'danger');
            }
        }

        async function toggleCardVisibility(cardId, lastFour) {
            const numSpan = document.getElementById(`cardNumber-${cardId}`);
            const btn = document.getElementById(`toggleBtn-${cardId}`);
            const icon = btn.querySelector('i');

            if (icon.classList.contains('bi-eye')) {
                // Show
                icon.classList.replace('bi-eye', 'bi-eye-slash');
                numSpan.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

                const { ok, data } = await api('GET', `/instruments/cards/${cardId}/details`);
                if (ok) {
                    const raw = data.data.card_number;
                    const formatted = raw.match(/.{1,4}/g).join(' ');
                    numSpan.textContent = formatted;
                } else {
                    showToast('Failed to retrieve card number', 'danger');
                    icon.classList.replace('bi-eye-slash', 'bi-eye');
                    numSpan.textContent = `•••• •••• •••• ${lastFour}`;
                }
            } else {
                // Hide
                icon.classList.replace('bi-eye-slash', 'bi-eye');
                numSpan.textContent = `•••• •••• •••• ${lastFour}`;
            }
        }

        async function confirmDeleteCard(cardId) {
            if (!confirm('Are you sure you want to remove this credit card?')) return;
            const { ok } = await api('DELETE', `/instruments/cards/${cardId}`);
            if (ok) {
                showToast('Card removed successfully', 'success');
                loadAll();
            } else {
                showToast('Failed to remove card', 'danger');
            }
        }

        loadAll();
    </script>
</body>

</html>
