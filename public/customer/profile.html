<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — PaySim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="brand"><i class="bi bi-shield-lock-fill"></i> PaySim</div>
            <div class="nav-section">
                <p class="section-title">Home</p>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door"></i> Home</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Payments</p>
                <a href="pay.html" class="nav-link"><i class="bi bi-send"></i> Make Payment</a>
                <a href="history.html" class="nav-link"><i class="bi bi-clock-history"></i> Transactions</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Banking</p>
                <a href="methods.html" class="nav-link"><i class="bi bi-credit-card"></i> My Methods</a>
                <a href="add-method.html" class="nav-link"><i class="bi bi-plus-circle"></i> Add Method</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Settings</p>
                <a href="profile.html" class="nav-link active"><i class="bi bi-person-circle"></i> My Profile</a>
            </div>
            <div class="nav-section" style="margin-top: auto;">
                <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <div class="topbar">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle"><i
                            class="bi bi-list"></i></button>
                    <h1 class="page-title">My Profile</h1>
                </div>
                <div class="user-info">
                    <div class="theme-toggle me-2" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                        <i class="bi bi-moon-fill"></i>
                    </div>
                    <span id="userName"></span>
                    <div class="user-avatar shadow-glow" id="userAvatar">C</div>
                </div>
            </div>

            <div class="content-area">
                <div class="row g-4">
                    <!-- Profile Details -->
                    <div class="col-md-7">
                        <div class="data-card glass-panel p-4">
                            <h5 class="fw-bold mb-4"><i class="bi bi-person me-2"></i>Personal Information</h5>
                            <form id="profileForm">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">First Name</label>
                                        <input type="text" id="firstName" class="form-control" required
                                            placeholder="John">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" id="lastName" class="form-control" required
                                            placeholder="Doe">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" id="email" class="form-control bg-light" readonly>
                                        <small class="text-muted">Email cannot be changed for security reasons.</small>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Phone Number</label>
                                        <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210">
                                    </div>
                                </div>
                                <div class="mt-4">
                                    <button type="submit" class="btn btn-primary px-4 py-2" id="saveProfileBtn">
                                        Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- PIN Management -->
                    <div class="col-md-5">
                        <div class="data-card glass-panel p-4">
                            <h5 class="fw-bold mb-4"><i class="bi bi-shield-lock me-2"></i>Security - Payment PIN</h5>
                            <p class="text-muted small mb-4">The 4-digit PIN used to authorize transactions.</p>

                            <form id="pinForm">
                                <div class="mb-3">
                                    <label class="form-label">Current PIN</label>
                                    <input type="password" id="oldPin" class="form-control" maxlength="4"
                                        placeholder="••••" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">New PIN</label>
                                    <input type="password" id="newPin" class="form-control" maxlength="4"
                                        placeholder="••••" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Confirm New PIN</label>
                                    <input type="password" id="confirmPin" class="form-control" maxlength="4"
                                        placeholder="••••" required>
                                </div>
                                <div class="mt-4">
                                    <button type="submit" class="btn btn-outline-primary w-100 py-2" id="savePinBtn">
                                        Update PIN
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) throw 'redirect';

        async function initProfile() {
            const { ok, data } = await api('GET', '/users/profile');
            if (ok) {
                document.getElementById('firstName').value = data.data.first_name || '';
                document.getElementById('lastName').value = data.data.last_name || '';
                document.getElementById('email').value = data.data.email || '';
                document.getElementById('phone').value = data.data.phone || '';
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';

            const payload = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                phone: document.getElementById('phone').value
            };

            const { ok, data } = await api('PATCH', '/users/profile', payload);
            btn.disabled = false;
            btn.innerHTML = originalText;

            if (ok) {
                showToast('Profile updated successfully!', 'success');
            } else {
                showToast(data.error?.message || 'Update failed', 'danger');
            }
        });

        document.getElementById('pinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPin = document.getElementById('oldPin').value;
            const newPin = document.getElementById('newPin').value;
            const confirmPin = document.getElementById('confirmPin').value;

            if (newPin !== confirmPin) {
                return alert('New PINs do not match');
            }

            if (newPin.length < 4) {
                return alert('PIN must be 4 digits');
            }

            const btn = document.getElementById('savePinBtn');
            btn.disabled = true;

            const { ok, data } = await api('PATCH', '/users/profile/pin', {
                old_pin: oldPin,
                new_pin: newPin
            });

            btn.disabled = false;
            if (ok) {
                showToast('PIN changed successfully!', 'success');
                document.getElementById('pinForm').reset();
            } else {
                showToast(data.error?.message || 'PIN change failed', 'danger');
            }
        });

        initProfile();
    </script>
</body>

</html>
