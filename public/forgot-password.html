<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — PaySim Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo">
                <h2><i class="bi bi-shield-lock"></i> PaySim</h2>
                <p>Reset Your Password</p>
            </div>

            <form id="forgotForm">
                <div class="mb-4 text-center">
                    <p class="text-muted small">Enter your email address and we'll send you an OTP to reset your
                        password.</p>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="you@example.com">
                </div>

                <div class="mb-4">
                    <label class="form-label">Account Type</label>
                    <select class="form-select" id="type">
                        <option value="customer">Customer</option>
                        <option value="merchant">Merchant</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="submitBtn">
                    Send Reset OTP
                </button>

                <div class="text-center">
                    <a href="/login.html" class="text-muted small text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            const type = document.getElementById('type').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Sending...';

            try {
                const { ok, data } = await api('POST', '/auth/forgot-password', { email, type });

                if (ok) {
                    showToast('OTP sent successfully!', 'success');
                    // Store email and type for the reset page
                    localStorage.setItem('resetEmail', email);
                    localStorage.setItem('resetType', type);

                    setTimeout(() => {
                        window.location.href = '/reset-password.html';
                    }, 1500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'Send Reset OTP';
                    showToast(data.error?.message || 'Failed to send OTP', 'danger');
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = 'Send Reset OTP';
                showToast('Network error', 'danger');
            }
        });
    </script>
</body>

</html>
