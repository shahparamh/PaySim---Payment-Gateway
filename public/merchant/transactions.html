<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions — PaySim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="brand"><i class="bi bi-shield-lock-fill"></i> PaySim</div>
            <div class="nav-section">
                <p class="section-title">Home</p>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door"></i> Home</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Payment Products</p>
                <a href="transactions.html" class="nav-link active"><i class="bi bi-arrow-left-right"></i>
                    Transactions</a>
                <a href="#" class="nav-link disabled"><i class="bi bi-link-45deg"></i> Payment Links</a>
                <a href="#" class="nav-link disabled"><i class="bi bi-credit-card-2-front"></i> Subscriptions</a>
            </div>
            <div class="nav-section">
                <p class="section-title">Banking Products</p>
                <a href="api-keys.html" class="nav-link"><i class="bi bi-key"></i> API Keys</a>
                <a href="apps.html" class="nav-link"><i class="bi bi-box"></i> Apps</a>
                <a href="analytics.html" class="nav-link"><i class="bi bi-graph-up"></i> Analytics</a>
            </div>
            <div class="nav-section" style="margin-top: auto;">
                <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="topbar">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle"><i
                            class="bi bi-list"></i></button>
                    <h1 class="page-title">Transactions</h1>
                </div>
                <div class="user-info">
                    <div class="theme-toggle me-2" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                        <i class="bi bi-moon-fill"></i>
                    </div>
                    <span id="userName"></span>
                    <div class="user-avatar" id="userAvatar">M</div>
                </div>
            </div>
            <div class="content-area">
                <div class="data-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">All Transactions</h5>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm" placeholder="Search Txn ID..."
                                id="txnSearch" style="max-width: 200px;">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Txn ID</th>
                                    <th>Amount</th>
                                    <th>Method</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="txnBody">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-5">Loading transactions...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
                        <div class="text-secondary small">Showing <span id="pageStart">0</span> to <span
                                id="pageEnd">0</span> of <span id="totalCount">0</span></div>
                        <nav id="pagination">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item disabled" id="prevPage"><a class="page-link" href="#">Previous</a>
                                </li>
                                <li class="page-item disabled" id="nextPage"><a class="page-link" href="#">Next</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) throw 'redirect';

        let currentPage = 1;
        const limit = 15;

        async function loadTransactions(page = 1) {
            currentPage = page;
            const { ok, data } = await api('GET', `/platform/transactions?page=${page}&limit=${limit}`);
            if (!ok) return;

            const txns = data.data.transactions;
            const pagination = data.data.pagination;

            const tbody = document.getElementById('txnBody');
            if (txns.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-5">No transactions found.</td></tr>';
            } else {
                tbody.innerHTML = txns.map(t => `
                    <tr>
                        <td class="text-mono small">${t.txn_id}</td>
                        <td class="fw-bold">${formatCurrency(t.amount)}</td>
                        <td><span class="text-capitalize small">${t.method_type.replace('_', ' ')}</span></td>
                        <td>${statusBadge(t.status)}</td>
                        <td class="text-secondary small">${formatDate(t.created_at)}</td>
                    </tr>
                `).join('');
            }

            // Update Counts
            const start = (page - 1) * limit + 1;
            const end = Math.min(page * limit, pagination.total);
            document.getElementById('pageStart').textContent = pagination.total === 0 ? 0 : start;
            document.getElementById('pageEnd').textContent = end;
            document.getElementById('totalCount').textContent = pagination.total;

            // Update Pagination Buttons
            document.getElementById('prevPage').classList.toggle('disabled', page === 1);
            document.getElementById('nextPage').classList.toggle('disabled', end >= pagination.total);

            document.getElementById('prevPage').onclick = () => page > 1 && loadTransactions(page - 1);
            document.getElementById('nextPage').onclick = () => end < pagination.total && loadTransactions(page + 1);
        }

        loadTransactions();
    </script>
</body>

</html>
