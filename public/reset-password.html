<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — PaySim Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo">
                <h2><i class="bi bi-shield-lock"></i> PaySim</h2>
                <p>Set New Password</p>
            </div>

            <form id="resetForm">
                <div class="mb-4 text-center">
                    <p class="text-muted small" id="infoMessage">Enter the 6-digit code sent to your email and your new
                        password.</p>
                </div>

                <!-- OTP Input -->
                <div class="mb-4">
                    <label class="form-label text-center d-block">Verification Code</label>
                    <div class="pin-input-container mb-2" id="otpInputs">
                        <input type="text" class="otp-box-plain" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box-plain" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box-plain" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box-plain" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box-plain" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box-plain" maxlength="1" inputmode="numeric">
                    </div>
                    <input type="hidden" id="otpVal">
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="newPassword" required
                            placeholder="Min 8 characters">
                        <button class="btn btn-outline-secondary" type="button"
                            onclick="toggleVisibility('newPassword', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required
                        placeholder="Re-type password">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="resetBtn">
                    Reset Password
                </button>

                <div class="text-center">
                    <a href="/login.html" class="text-muted small text-decoration-none">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const email = localStorage.getItem('resetEmail');
        const type = localStorage.getItem('resetType');

        if (!email || !type) {
            window.location.href = '/forgot-password.html';
        } else {
            document.getElementById('infoMessage').textContent = `Enter the 6-digit code sent to ${email} and set your new password.`;
        }

        // OTP Input Logic
        const boxes = document.querySelectorAll('#otpInputs .otp-box-plain');
        boxes.forEach((box, idx) => {
            box.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && idx < 5) boxes[idx + 1].focus();
                updateOtpVal();
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) boxes[idx - 1].focus();
            });
        });

        function updateOtpVal() {
            let val = '';
            boxes.forEach(b => val += b.value);
            document.getElementById('otpVal').value = val;
        }

        function toggleVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const code = document.getElementById('otpVal').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (code.length !== 6) return showToast('Enter 6-digit OTP', 'warning');
            if (newPassword !== confirmPassword) return showToast('Passwords do not match', 'warning');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';

            try {
                const { ok, data } = await api('POST', '/auth/reset-password', {
                    email,
                    code,
                    new_password: newPassword,
                    type
                });

                if (ok) {
                    showToast('Password reset successful! Redirecting to login...', 'success');
                    localStorage.removeItem('resetEmail');
                    localStorage.removeItem('resetType');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'Reset Password';
                    showToast(data.error?.message || 'Failed to reset password', 'danger');
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = 'Reset Password';
                showToast('Network error', 'danger');
            }
        });
    </script>
</body>

</html>
